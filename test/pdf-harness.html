<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF 翻译阅读器（测试）</title>
    <link rel="stylesheet" href="../src/pdf/pdfViewer.css">
  </head>
  <body>
    <script>
      // Mirror of src/pdf/pdfViewer.html with stubbed chrome APIs so the
      // viewer can run outside the extension. Open with:
      //   /test/pdf-harness.html?src=/test/real-paper.pdf
      globalThis.__sentPayloads = [];
      globalThis.chrome = {
        runtime: {
          getURL: (path) => path,
          sendMessage: async (message) => {
            globalThis.__sentPayloads.push(message.payload);
            await new Promise((resolve) => setTimeout(resolve, 150 + Math.random() * 250));
            const block = message.payload.blocks[0];
            if (/Selective/.test(block.text)) {
              return { results: [{ id: block.id, translatedText: "", error: "模拟 API 失败" }] };
            }
            return { results: [{ id: block.id, translatedText: "【译文】" + block.text }] };
          },
          onMessage: { addListener: () => {} }
        },
        storage: {
          local: {
            get: async () => ({
              "paperTranslator.config": {
                enabled: true,
                autoTranslate: true,
                displayMode: "bilingual",
                apiEndpoint: "http://fake.example/translate",
                urlRules: ["*"],
                maxConcurrentRequests: 4,
                glossary: "Mamba=MAMBA模型"
              }
            }),
            set: async () => {}
          }
        }
      };
    </script>

    <header id="toolbar">
      <div id="docTitle">PDF 翻译阅读器</div>
      <div id="progress" data-state="idle"></div>
      <div class="toolbar-actions">
        <button id="translateAll" type="button">翻译整篇</button>
        <a id="sourceLink" target="_blank" rel="noopener noreferrer">打开原始 PDF</a>
      </div>
    </header>

    <div id="banner" hidden></div>

    <main id="pages"></main>

    <script src="../src/shared/constants.js"></script>
    <script src="../src/shared/config.js"></script>
    <script src="../src/shared/glossary.js"></script>
    <script src="../src/pdf/pdfTranslator.js"></script>
    <script type="module" src="../src/pdf/pdfViewer.js"></script>
  </body>
</html>
